table: "TBL_CONSUMPTION_EVENTS"
full_path: "SFDC_CONSUMPTION.CORE.TBL_CONSUMPTION_EVENTS"
type: "table"
endorsed_by: "Central Strategy & Consumption"

description: >
  Event-level record of every consumption unit generated by an account user.
  Primary fact table for all consumption analytics. One row per discrete
  consumption event — not pre-aggregated.

grain: "one row per consumption event"

primary_key:
  - "event_id"

columns:
  event_id:
    type: "VARCHAR"
    description: "Unique identifier for the consumption event"
  account_id:
    type: "VARCHAR"
    description: "Account that generated the event — joins to VW_ACCOUNT_DETAILS"
  user_id:
    type: "VARCHAR"
    description: "User who triggered the event — joins to TBL_USER_ACTIVATION"
  event_date:
    type: "DATE"
    description: "Calendar date the event occurred (local time, no conversion needed)"
  event_timestamp:
    type: "TIMESTAMP_NTZ"
    description: "Full timestamp of the event in UTC"
  consumption_units:
    type: "NUMBER"
    description: "Units consumed in this event — the core numeric measure"
  product_sku:
    type: "VARCHAR"
    description: "Product that generated the consumption (e.g., AGENTFORCE, DATA_CLOUD)"
  event_type:
    type: "VARCHAR"
    description: "Type of consumption action (e.g., AGENT_RUN, QUERY, ACTIVATION)"
  session_id:
    type: "VARCHAR"
    description: "Groups related events within a single user session"

join_keys:
  - with: "SALESFORCE_CRM.PUBLIC.VW_ACCOUNT_DETAILS"
    on: "TBL_CONSUMPTION_EVENTS.account_id = VW_ACCOUNT_DETAILS.account_id"
  - with: "SFDC_CONSUMPTION.CORE.TBL_USER_ACTIVATION"
    on: "TBL_CONSUMPTION_EVENTS.user_id = TBL_USER_ACTIVATION.user_id"
  - with: "SHARED.DW.DIM_DATE"
    on: "TBL_CONSUMPTION_EVENTS.event_date = DIM_DATE.date"
  - with: "SFDC_CONSUMPTION.CORE.TBL_ACCOUNT_ENTITLEMENTS"
    on: "TBL_CONSUMPTION_EVENTS.account_id = TBL_ACCOUNT_ENTITLEMENTS.account_id AND TBL_ACCOUNT_ENTITLEMENTS.is_active = TRUE"

required_filters:
  - "Always filter by date range — full table scans are expensive"
  - "Exclude test accounts by joining to VW_ACCOUNT_DETAILS: ad.is_test_account = FALSE"

caveats:
  - "event_timestamp is UTC — event_date is already local time, use event_date for daily aggregations"
  - "consumption_units scale varies by product_sku — do not sum across SKUs without confirming unit equivalence"
  - "Rows are not deduplicated at the session level — COUNT(DISTINCT session_id) if session-level counts are needed"

related_metrics:
  - "ccr"
  - "uts"
